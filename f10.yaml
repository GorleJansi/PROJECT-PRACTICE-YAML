---
- name: Use group variables group_vars/all.yaml,group_vars/man.yaml
  hosts: man
  become: true
  tasks:
    - name: "install package {{ pkg_sql }}"
      ansible.builtin.dnf:
        name: "{{ pkg_sql }}"
        state: present

    - name: "service start and enable"
      ansible.builtin.service:
        name: "{{ service_sql }}"
        state: started
        enabled: true
            
