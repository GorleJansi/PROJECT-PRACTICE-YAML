---
- name: Install package based on OS family.
  hosts: man
  become: true
  tasks:
    - name: use dnf when OS family is RedHat
      dnf:
        name: httpd
        state: present
      when: ansible_facts['os_family']== 'RedHat'
    - name: use apt when OS family is Debian
      apt:
        name: httpd
        state: present
      when: ansible_facts['os_family']== 'Debian'   