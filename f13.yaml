---
- name: Create users using list of dictionaries.
  hosts: man
  become: true
  tasks:
     - name: Create users
       user:
          name: '{{ item.name }}'
          state: present
          shell: "{{ item.shell }}"
          comment: "{{ item.comment }}"
       loop:
          - {'name':'ansi', 'shell:'/bin/bash', 'comment':'ansi user for ansible test'}