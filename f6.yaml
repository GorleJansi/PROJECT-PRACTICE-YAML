---
- name: create user if not exist is the work to do
  hosts: man
  become: true
  tasks:
    - name: check if user exists
      ansible.builtin.command: id roboshop
      register: user_op
      ignore_errors: true
      changed_when: false
    # - name: check the output of id command
    #   debug:
    #     var: user_op
    - name: create user if not exist    
      ansible.builtin.user:
        name: roboshop
        shell: /bin/sh
        state: present
      when: user_op.rc != 0
